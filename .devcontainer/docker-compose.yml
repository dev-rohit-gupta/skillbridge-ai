services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: skillbridge
      POSTGRES_USER: skillbridge
      POSTGRES_PASSWORD: skillbridge
    ports:
      - "5432:5432"
    volumes:
      - skillbridge_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillbridge -d skillbridge"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  skillbridge_postgres:
