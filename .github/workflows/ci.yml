name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: skillbridge
          POSTGRES_USER: skillbridge
          POSTGRES_PASSWORD: skillbridge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skillbridge -d skillbridge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://skillbridge:skillbridge@localhost:5432/skillbridge
      ACCESS_TOKEN_SECRET: ci-access-secret-with-at-least-thirty-two-characters
      REFRESH_TOKEN_SECRET: ci-refresh-secret-with-at-least-thirty-two-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn db:migrate
      - run: yarn db:seed
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build
